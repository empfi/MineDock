<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MineDock</title>
  </head>

  <body>
    <div id="root" style="height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; background-color: #0f0f11;">
      <style>
        .pulse-logo {
          width: 80px;
          height: 80px;
          border-radius: 12px;
          animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.5; transform: scale(0.95); }
        }
      </style>
      <img src="/logo.png" alt="Loading..." class="pulse-logo" />
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
